run_id = "example-study"
output_root = "."
env_file = ".env"
base_model = "gpt-4o-mini"
total_token_budget = 250000
timeout_seconds = 1800
repeats = 1
arms = ["mas_centralize", "mas_decentralized"]

[harness]
dataset_name = "SWE-bench/SWE-bench_Lite"
dataset_split = "test"
repo_cache_dir = ".cache/repos"
grade_work_dir = ".cache/grades"

auto_provision_runtime = true
provision_python_version = "3.9"
[harness.provision_python_versions]

[adapters.mas_centralize]
cwd = "/home/cerberose/mas-centralized"
command = ["uv", "run", "python", "main.py", "run_swebench", "--task_path={run_dir}/task_context.json"]

[adapters.mas_decentralized]
cwd = "/home/cerberose/mas-decentralized"
command = ["uv", "run", "python", "main.py", "run_swebench", "--task_path={run_dir}/task_context.json"]
